<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typing Battle</title>

<link rel="stylesheet" href="style.css">


<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

</head>


<body>


<div id="menu">


<h1>⚔️ Typing Battle</h1>


<h3>Select Time</h3>


<select id="timeSelect">

<option value="60">
1 Minute
</option>

<option value="180">
3 Minutes
</option>

<option value="300">
5 Minutes
</option>

</select>



<h3>Select Difficulty</h3>


<select id="difficulty">


<option value="beginner">
🟢 Beginner
</option>


<option value="normal">
🔵 Normal
</option>


<option value="peak">
🟠 Peak
</option>


<option value="nightmare">
🔴 Nightmare
</option>


<option value="legend">
🟣 Legend
</option>


</select>



<br><br>


<button id="playBtn">
▶ START GAME
</button>


</div>





<!-- GAME SCREEN -->


<div id="battleScreen" style="display:none;">


<h2>
⚔️ Battle Arena
</h2>

<div id="arena">

    <div id="player">
<img src="<img src="https://i.ibb.co.com/5W28pnW7/1000056026-removebg-preview.png" width="120">
</div>


<div id="enemy">
<img src="<img src="https://i.ibb.co.com/mC6rBg0S/1000056028-removebg-preview.png" width="120">
</div>
    
</div>

<div class="stats">


<div>
❤️ Player HP:
<span id="playerHP">
100
</span>
</div>


<div>
👹 Enemy HP:
<span id="enemyHP">
100
</span>
</div>



<div>
⏱️ Time:
<span id="timer">
60
</span>
</div>



<div>
🏆 Score:
<span id="score">
0
</span>
</div>


<div>
⚡ WPM:
<span id="wpm">
0
</span>
</div>


<div>
🎯 Accuracy:
<span id="accuracy">
100%
</span>
</div>


</div>




<h3 id="targetText">

Loading...

</h3>




<input 
id="typingInput"
type="text"
placeholder="Type here..."
autocomplete="off"
/>



</div>




<div id="game"></div>




<script src="game.js"></script>


</body>

</html>
