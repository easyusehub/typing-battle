<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Typing Battle</title>

    <link rel="stylesheet" href="style.css">

    <!-- Phaser Game Engine -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>

<body>

    <div id="menu">

<h1>⚔️ Typing Battle</h1>

<h3>Choose Time</h3>

<button class="timeBtn" data-time="60">1 Minute</button>
<button class="timeBtn" data-time="180">3 Minutes</button>
<button class="timeBtn" data-time="300">5 Minutes</button>


<h3>Choose Difficulty</h3>

<select id="difficulty">

<option value="beginner">🟢 Beginner</option>
<option value="normal">🔵 Normal</option>
<option value="peak">🟠 Peak</option>
<option value="nightmare">🔴 Nightmare</option>
<option value="legend">🟣 Legend</option>

</select>


<br><br>

<button id="playBtn">
▶ START GAME
</button>

    </div>


    <div id="battleScreen" style="display:none;">

<h2>⚔️ Battle Started</h2>

<div>
Time:
<span id="timer">60</span>
</div>

<div>
Score:
<span id="score">0</span>
</div>

<div>
WPM:
<span id="wpm">0</span>
</div>

<div>
Accuracy:
<span id="accuracy">100%</span>
</div>


<hr>


<h3 id="targetText">
Loading...
</h3>


<input 
id="typingInput"
type="text"
placeholder="Type here..."
autocomplete="off"
/>


    </div>

    <div id="game"></div>


    <!-- Our Game Code -->

    <script src="game.js"></script>

</body>
</html>
